<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Candidate Ranker</title>
    <!-- FIXED: Corrected the Play CDN script link for Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <div class="container mx-auto px-4 py-8 max-w-5xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-indigo-400 tracking-tight">Project-Based AI Job Ranker</h1>
            <p class="text-gray-400 mt-2 text-lg">Automatically ranking technical talent based on codebase depth and scope.</p>
        </header>

        <main>
            <div class="bg-gray-800 shadow-xl rounded-xl border border-gray-700 overflow-hidden">
                <div class="p-6 border-b border-gray-700 flex justify-between items-center">
                    <h2 class="text-xl font-bold text-white">Live AI Leaderboard</h2>
                    <span class="px-3 py-1 text-xs bg-indigo-500/20 text-indigo-300 rounded-full font-semibold tracking-wider">Sorted by AI Score</span>
                </div>
                <div id="leaderboard" class="divide-y divide-gray-700">
                    <div class="p-8 text-center text-gray-500">Connecting to AI backend pipeline...</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        async function fetchRankings() {
            const container = document.getElementById('leaderboard');
            try {
                // FIXED: Repaired the broken, cut-off local network URL
                const response = await fetch('http://127.0.0');
                if (!response.ok) throw new Error('Backend offline');
                const candidates = await response.json();
                container.innerHTML = '';

                candidates.forEach((candidate, index) => {
                    let rankBadge = `<span class="text-gray-400 font-bold text-lg w-6 text-center">#${index + 1}</span>`;
                    if (index === 0) rankBadge = `<span class="text-yellow-400 text-xl w-6 text-center">🥇</span>`;
                    if (index === 1) rankBadge = `<span class="text-gray-300 text-xl w-6 text-center">🥈</span>`;
                    if (index === 2) rankBadge = `<span class="text-amber-600 text-xl w-6 text-center">🥉</span>`;

                    const card = document.createElement('div');
                    card.className = "p-6 flex flex-col md:flex-row md:items-center justify-between gap-6";
                    
                    let projectsHtml = '';
                    candidate.projects.forEach(p => {
                        projectsHtml += `
                            <div class="mt-3 p-3 bg-gray-900/60 rounded-lg border border-gray-700/50">
                                <div class="flex justify-between items-start">
                                    <h4 class="text-sm font-semibold text-indigo-300">${p.title}</h4>
                                    <span class="text-xs font-mono px-2 py-0.5 bg-gray-800 text-green-400 rounded">AI Match: ${p.ai_score}%</span>
                                </div>
                                <p class="text-xs text-gray-400 mt-1">${p.description}</p>
                                <div class="flex flex-wrap gap-1 mt-2">
                                    ${p.technologies.map(t => `<span class="text-[10px] bg-gray-800 px-2 py-0.5 text-gray-300 rounded">${t}</span>`).join('')}
                                </div>
                            </div>
                        `;
                    });

                    card.innerHTML = `
                        <div class="flex items-start gap-4 flex-1">
                            ${rankBadge}
                            <div class="flex-1">
                                <h3 class="text-lg font-bold text-white">${candidate.name}</h3>
                                <p class="text-xs text-gray-400">${candidate.email}</p>
                                ${projectsHtml}
                            </div>
                        </div>
                        <div class="flex flex-col items-center justify-center bg-gray-900/40 p-4 rounded-xl border border-gray-700 min-w-[110px]">
                            <span class="text-xs text-gray-400 font-medium uppercase">Overall Match</span>
                            <span class="text-3xl font-extrabold text-indigo-400">${candidate.overall_score}%</span>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                container.innerHTML = `
                    <div class="p-8 text-center text-red-400">
                        <p class="font-semibold">⚠️ Local Pipeline Offline</p>
                        <p class="text-xs text-gray-500 mt-2">Run <code class="bg-gray-900 p-1 rounded text-red-300">python backend.py</code> in your terminal first.</p>
                    </div>`;
            }
        }
        window.addEventListener('DOMContentLoaded', fetchRankings);
    </script>
</body>
</html>
